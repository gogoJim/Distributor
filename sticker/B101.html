<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>R型複合式受信總機(L@titude)規格表</title>
    <style>
        .spec-box {
            border: 1px solid #333;
            padding: 20px;
            font-family: "微軟正黑體", sans-serif;
            line-height: 1.8;
            font-size: 1.1em;
            max-width: 900px;
            margin: 20px auto;
        }
        .spec-item {
            margin: 8px 0;
        }
        .section {
            margin-top: 25px;
        }
    </style>
</head>
<body>
    <div class="spec-box">
        <div class="spec-item">設備名稱:R型複合式受信總機</div>
        <div class="spec-item">型號：L@titude</div>
        <div class="spec-item">認可號碼:</div>
        <div class="spec-item">迴路數/定址點:16 迴路 /2032 點</div>
        <div class="spec-item">輸入電壓/電流: 110/220Vac  60Hz 3A</div>
        <div class="spec-item">產地/廠牌:英國/HOCHIKI</div>
        <div class="spec-item">總機製造日期:</div>

        <div class="section">
            <div class="spec-item">蓄電池:  12Vdc/7Ah*2</div>
            <div class="spec-item">電池出廠:        年   月</div>
            <div class="spec-item">保險絲用途:保護電源供給器避免輸入過大電流導致電電子零件損壞。</div>
            <div class="spec-item">保險絲接點容量/安裝位置: AC220V 3A / SB 5*20mm</div>
        </div>

        <div class="section">
            <div class="spec-item">以下電驛接點容量: 30VDC/1A</div>
            <div class="spec-item">FAULT 、FIRE 、ALARM 、PROG 1、PROG 2</div>
        </div>
    </div>
</body>
</html>
