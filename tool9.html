<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>消防系統採購需求表單</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            color: #333;
            display: flex;
            min-height: 100vh;
        }
        
        /* 左側導覽列樣式 */
        .sidebar {
            width: 250px;
            background-color: #2c3e50;
            color: white;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            overflow-y: auto;
        }
        
        .sidebar-header {
            padding: 0 20px 20px;
            border-bottom: 1px solid #34495e;
            margin-bottom: 15px;
        }
        
        .sidebar-header h2 {
            margin: 0;
            font-size: 1.4em;
            color: white;
        }
        
        .nav-list {
            list-style: none;
            padding: 0;
            margin: 0;
            flex-grow: 1;
        }
        
        .nav-item {
            margin: 0;
        }
        
        .nav-button {
            display: block;
            width: 100%;
            text-align: left;
            background: none;
            border: none;
            color: #ecf0f1;
            padding: 12px 20px;
            cursor: pointer;
            font-size: 15px;
            transition: all 0.3s;
            border-left: 4px solid transparent;
        }
        
        .nav-button:hover {
            background-color: #34495e;
            color: white;
        }
        
        .nav-button.active {
            background-color: #3498db;
            color: white;
            border-left: 4px solid #2980b9;
        }
        
        .sidebar-footer {
            padding: 20px;
            border-top: 1px solid #34495e;
        }
        
        .export-btn {
            background-color: #27ae60;
            color: white;
            padding: 12px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            transition: background-color 0.3s;
        }
        
        .export-btn:hover {
            background-color: #219653;
        }
        
        /* 主內容區樣式 */
        .main-content {
            flex-grow: 1;
            margin-left: 250px;
            padding: 20px;
            max-width: calc(100% - 250px);
            box-sizing: border-box;
        }
        
        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 30px;
        }
        
        .version-info {
            text-align: right;
            color: #7f8c8d;
            font-size: 12px;
            margin-bottom: 10px;
        }
        
        .form-section {
            background-color: #f9f9f9;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
            border-left: 4px solid #3498db;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        select, input[type="text"], input[type="number"], textarea {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        
        .equipment-list {
            display: none;
        }
        
        .equipment-list.active {
            display: block;
        }
        
        .equipment-item {
            margin-bottom: 10px;
            padding: 10px;
            background-color: #eee;
            border-radius: 4px;
        }
        
        .sub-options {
            margin-left: 20px;
            padding-left: 20px;
            border-left: 2px solid #ccc;
        }
        
        .sub-option-row {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            padding: 5px;
            background-color: #f5f5f5;
            border-radius: 4px;
        }
        
        .sub-option-row label {
            margin: 0 10px 0 5px;
            font-weight: normal;
            min-width: 100px;
        }
        
        .model-select, .model-input {
            width: 200px;
            margin-right: 10px;
        }
        
        .qty-input {
            width: 60px;
            margin-right: 10px;
        }
        
        .add-btn {
            background-color: #4CAF50;
            color: white;
            padding: 5px 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .add-btn:hover {
            background-color: #45a049;
        }
        
        .base-option {
            margin-left: 20px;
            padding: 5px;
            background-color: #e9f7ef;
            border-radius: 4px;
            display: none;
        }
        
        .terminal-resistor {
            margin-left: 20px;
            padding: 5px;
            background-color: #fff3cd;
            border-radius: 4px;
            display: none;
        }
        
        .project-name-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .project-name-input {
            flex-grow: 1;
        }
        
        .connection-wire-option {
            margin-left: 20px;
            padding-left: 20px;
            border-left: 2px solid #ccc;
        }
        
        /* 其他設備樣式 */
        .other-equipment-container {
            margin-top: 20px;
        }
        
        .other-equipment-list {
            margin-top: 15px;
        }
        
        .other-item {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            padding: 10px;
            background-color: #f0f8ff;
            border-radius: 4px;
        }
        
        .other-item input {
            margin-right: 10px;
        }
        
        .remove-btn {
            background-color: #e74c3c;
            color: white;
            padding: 5px 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            margin-left: auto;
        }
        
        .remove-btn:hover {
            background-color: #c0392b;
        }
        
        /* 響應式設計 */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }
            
            .sidebar {
                width: 100%;
                height: auto;
                position: static;
                padding: 10px 0;
            }
            
            .main-content {
                margin-left: 0;
                max-width: 100%;
            }
            
            .nav-list {
                display: flex;
                flex-wrap: wrap;
            }
            
            .nav-item {
                flex: 1 0 50%;
            }
            
            .nav-button {
                text-align: center;
                padding: 10px 5px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <!-- 左側導覽列 -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>消防系統選單</h2>
            <div class="version-info">Ver.2.2  2026/1/6 HTBO/Jim</div>
        </div>
        
        <ul class="nav-list">
            <li class="nav-item">
                <button class="nav-button active" data-target="project-info">專案資訊</button>
            </li>
            <li class="nav-item">
                <button class="nav-button" data-target="japanese-fire-equipment">日規火警系統</button>
            </li>
            <li class="nav-item">
                <button class="nav-button" data-target="american-fire-equipment">美規火警系統</button>
            </li>
            <li class="nav-item">
                <button class="nav-button" data-target="general-fire-equipment">一般消防設備</button>
            </li>
            <li class="nav-item">
                <button class="nav-button" data-target="american-gas-equipment">美規氣體滅火</button>
            </li>
            <li class="nav-item">
                <button class="nav-button" data-target="fixed-extinguisher-equipment">固定式滅火設備</button>
            </li>
            <li class="nav-item">
                <button class="nav-button" data-target="small-water-equipment">小規模水鎗系統</button>
            </li>
            <li class="nav-item">
                <button class="nav-button" data-target="medium-water-equipment">中規模水鎗系統</button>
            </li>
            <li class="nav-item">
                <button class="nav-button" data-target="large-water-equipment">大規模水鎗系統</button>
            </li>
            <li class="nav-item">
                <button class="nav-button" data-target="other-equipment">其他</button>
            </li>
        </ul>
        
        <div class="sidebar-footer">
		    <button type="button" class="export-btn" onclick="exportToJSON()" style="margin-top: 10px; background-color: #e67e22;">匯出JSON</button>
            <button type="button" class="export-btn" onclick="exportToHTML()">匯出HTML</button>
        </div>
    </div>
    
    <!-- 主內容區 -->
    <div class="main-content">
        <h1>消防系統採購需求表單</h1>
        
        <!-- 專案資訊區塊 (預設顯示) -->
        <div id="project-info" class="form-section equipment-list active">
            <div class="form-group">
                <label for="project-name">專案名稱</label>
                <div class="project-name-container">
                    <input type="text" id="project-name" name="project-name" class="project-name-input" required>
                </div>
            </div>
        </div>
        
        <!-- 日規火警系統設備選項 -->
        <div id="japanese-fire-equipment" class="equipment-list">
            <!-- 原有日規火警系統內容保持不變 -->
            <div class="form-section">
                <h3>日規火警系統設備選項</h3>
                
                <div class="form-group">
                    <label>基本構成設備</label>
                    
                    <!-- 火警總機 section - modified to add 分散盤 when HRU is selected -->
                    <div class="equipment-item">
                        <label>火警總機</label>
                        
                        <div class="sub-options" id="control-panel-container">
                            <!-- HRN Section (unchanged) -->
                            <div class="sub-option-row">
                                <label>HRN</label>
                                <select id="jf-hrn-model" name="jf-hrn-model" class="model-select">
                                    <option value="">-- 選擇型號 --</option>
                                    <option value="HRN-ABW510FGA(T)">HRN-ABW510FGA(T)</option>
                                    <option value="HRN-ABW1020FGA(T)">HRN-ABW1020FGA(T)</option>
                                    <option value="HRN-ABS510FGA(T)">HRN-ABS510FGA(T)</option>
                                    <option value="HRN-ABS1020FGA(T)">HRN-ABS1020FGA(T)</option>
                                    <option value="HRN-ABS2040FGA(T)">HRN-ABS2040FGA(T)</option>
                                    <option value="HRN-ABS2550FGA(T)">HRN-ABS2550FGA(T)</option>
                                    <option value="HRN-ABS510FGA(T-OP5K)">HRN-ABS510FGA(T-OP5K)</option>				
                                    <option value="HRN-ABS1020FGA(T-OP5K)">HRN-ABS1020FGA(T-OP5K)</option>
                                    <option value="HRN-ABS2040FGA(T-OP5K)">HRN-ABS2040FGA(T-OP5K)</option>
                                    <option value="HRN-ABS2550FGA(T-OP5K)">HRN-ABS2550FGA(T-OP5K)</option>
                                </select>
                                <input type="number" id="jf-hrn-qty" name="jf-hrn-qty" value="0" min="0" class="qty-input">
                                <button type="button" class="add-btn" onclick="addControlPanel('HRN')">增添</button>
                            </div>
                            
                            <!-- HRR Section (unchanged) -->
                            <div class="sub-option-row">
                                <label>HRR</label>
                                <select id="jf-hrr-model" name="jf-hrr-model" class="model-select">
                                    <option value="">-- 選擇型號 --</option>
                                    <option value="HRR-AAW510">HRR-AAW510</option>
                                    <option value="HRR-AAW1020">HRR-AAW1020</option>
                                    <option value="HRR-AAS510">HRR-AAS510</option>
                                    <option value="HRR-AAS1020">HRR-AAS1020</option>
                                    <option value="HRR-AAS2040">HRR-AAS2040</option>
                                    <option value="HRR-AAS2550">HRR-AAS2550</option>
                                    <option value="HRR-AAS4080">HRR-AAS4080</option>
                                    <option value="HRR-AAS5100">HRR-AAS5100</option>
                                    <option value="HRR-AAS5610">HRR-AAS5610</option>
                                </select>
                                <input type="number" id="jf-hrr-qty" name="jf-hrr-qty" value="0" min="0" class="qty-input">
                                <button type="button" class="add-btn" onclick="addControlPanel('HRR')">增添</button>
                            </div>
                            
                            <!-- HRU Section - modified to include 分散盤 option -->
                            <div class="sub-option-row">
                                <label>HRU</label>
                                <select id="jf-hru-model" name="jf-hru-model" class="model-select" onchange="checkHRUQuantity()">
                                    <option value="">-- 選擇型號 --</option>
                                    <option value="HRU-ABS510(OP)">HRU-ABS510(OP)</option>
                                    <option value="HRU-ABS1020(OP)">HRU-ABS1020(OP)</option>
                                </select>
                                <input type="number" id="jf-hru-qty" name="jf-hru-qty" value="0" min="0" class="qty-input" onchange="checkHRUQuantity()">
                                <button type="button" class="add-btn" onclick="addControlPanel('HRU')">增添</button>
                            </div>
                            
                            <!-- 分散盤 option (hidden by default) -->
                            <div class="sub-option-row" id="distribution-panel-row" style="display:none;">
                                <label>分散盤</label>
                                <select id="jf-cma-model" name="jf-cma-model" class="model-select">
                                    <option value="">-- 選擇型號 --</option>
                                    <option value="CMA-ABW510(OP)">CMA-ABW510(OP)</option>
                                    <option value="CMA-ABW1020(OP)">CMA-ABW1020(OP)</option>
                                    <option value="CMA-ABW2040(OP)">CMA-ABW2040(OP)</option>
                                </select>
                                <input type="number" id="jf-cma-qty" name="jf-cma-qty" value="0" min="0" class="qty-input">
                                <button type="button" class="add-btn" onclick="addDistributionPanel()">增添</button>
                            </div>
                        </div>
                    </div>

                    <!-- 定址設備 -->
                    <div class="equipment-item">
                        <label>定址設備</label>
                        
                        <div class="sub-options">
                            <!-- 定址偵煙 -->
                            <div class="sub-option-row">
                                <label>定址偵煙</label>
                                <input type="text" id="jf-smoke-model" name="jf-smoke-model" value="ALK-NLYA" class="model-input" >
                                <input type="number" id="jf-smoke-qty" name="jf-smoke-qty" value="0" min="0" class="qty-input" placeholder="數量" onchange="toggleBaseOptions('smoke')">
                            </div>
                            <div class="base-option" id="smoke-base">
                                <div class="sub-option-row">
                                    <label>底座</label>
                                    <input type="text" id="jf-smoke-base-model" name="jf-smoke-base-model" value="YBN-R/1NA" class="model-input" >
                                    <input type="number" id="jf-smoke-base-qty" name="jf-smoke-base-qty" value="0" min="0" class="qty-input" placeholder="數量">
                                </div>
                            </div>
                            
                            <!-- 定址差動 -->
                            <div class="sub-option-row">
                                <label>定址差動</label>
                                <input type="text" id="jf-differential-model" name="jf-differential-model" value="ASB-2LYA" class="model-input" >
                                <input type="number" id="jf-differential-qty" name="jf-differential-qty" value="0" min="0" class="qty-input" placeholder="數量" onchange="toggleBaseOptions('differential')">
                            </div>
                            <div class="base-option" id="differential-base">
                                <div class="sub-option-row">
                                    <label>底座</label>
                                    <input type="text" id="jf-differential-base-model" name="jf-differential-base-model" value="YBN-R/1NA" class="model-input" >
                                    <input type="number" id="jf-differential-base-qty" name="jf-differential-base-qty" value="0" min="0" class="qty-input" placeholder="數量">
                                </div>
                            </div>
                            
                            <!-- 定址定溫 -->
                            <div class="sub-option-row">
                                <label>定址定溫</label>
                                <input type="text" id="jf-fixed-temp-model" name="jf-fixed-temp-model" value="ATI-NWRLYA" class="model-input" >
                                <input type="number" id="jf-fixed-temp-qty" name="jf-fixed-temp-qty" value="0" min="0" class="qty-input" placeholder="數量">
                            </div>
                            
                            <!-- 定址發信機 with 連接線 option -->
                            <div class="sub-option-row">
                                <label>定址發信機</label>
                                <input type="text" id="jf-transmitter-model" name="jf-transmitter-model" value="PRK-1A" class="model-input">
                                <input type="number" id="jf-transmitter-qty" name="jf-transmitter-qty" value="0" min="0" class="qty-input" placeholder="數量" onchange="toggleConnectionWire()">
                            </div>
                            <div class="connection-wire-option" id="connection-wire-row" style="display:none;">
                                <div class="sub-option-row">
                                    <label>連接線</label>
                                    <input type="text" id="jf-connection-wire-model" name="jf-connection-wire-model" value="YYT-9A" class="model-input" readonly>
                                    <input type="number" id="jf-connection-wire-qty" name="jf-connection-wire-qty" value="0" min="0" class="qty-input" placeholder="數量">
                                </div>
                            </div>
                            
                            <!-- 定址光電分離型 -->
                            <div class="sub-option-row">
                                <label>定址光電分離型</label>
                                <input type="text" id="jf-photo-model" name="jf-photo-model" value="ABC-2LY" class="model-input" >
                                <input type="number" id="jf-photo-qty" name="jf-photo-qty" value="0" min="0" class="qty-input" placeholder="數量">
                            </div>
                        </div>
                    </div>
                    
                    <!-- 中繼器 -->
                    <div class="equipment-item">
                        <label>中繼器</label>
                        
                        <div class="sub-options">
                            <div class="sub-option-row">
                                <label>火警單回KL</label>
                                <input type="text" id="jf-kl-model" name="jf-kl-model" value="CHW-KL" class="model-input">
                                <input type="number" id="jf-kl-qty" name="jf-kl-qty" value="0" min="0" class="qty-input" placeholder="數量" onchange="toggleTerminalResistor('kl')">
                            </div>
                            <div class="terminal-resistor" id="kl-terminal">
                                <div class="sub-option-row">
                                    <label>終端電阻</label>
                                    <input type="text" id="jf-kl-terminal-model" name="jf-kl-terminal-model" value="TE-RH" class="model-input" readonly>
                                    <input type="number" id="jf-kl-terminal-qty" name="jf-kl-terminal-qty" value="0" min="0" class="qty-input" placeholder="數量">
                                </div>
                            </div>
                            <div class="sub-option-row">
                                <label>火警4回K4</label>
                                <input type="text" id="jf-k4-model" name="jf-k4-model" value="CHW-K4P" class="model-input">
                                <input type="number" id="jf-k4-qty" name="jf-k4-qty" value="0" min="0" class="qty-input" placeholder="數量" onchange="toggleTerminalResistor('k4')">
                            </div>
                            <div class="terminal-resistor" id="k4-terminal">
                                <div class="sub-option-row">
                                    <label>終端電阻</label>
                                    <input type="text" id="jf-k4-terminal-model" name="jf-k4-terminal-model" value="TE-RH" class="model-input" readonly>
                                    <input type="number" id="jf-k4-terminal-qty" name="jf-k4-terminal-qty" value="0" min="0" class="qty-input" placeholder="數量">
                                </div>
                            </div>
                            <div class="sub-option-row">
                                <label>火警8回K8</label>
                                <input type="text" id="jf-k8-model" name="jf-k8-model" value="CHW-K8" class="model-input">
                                <input type="number" id="jf-k8-qty" name="jf-k8-qty" value="0" min="0" class="qty-input" placeholder="數量" onchange="toggleTerminalResistor('k8')">
                            </div>
                            <div class="terminal-resistor" id="k8-terminal">
                                <div class="sub-option-row">
                                    <label>終端電阻</label>
                                    <input type="text" id="jf-k8-terminal-model" name="jf-k8-terminal-model" value="TE-RH" class="model-input" readonly>
                                    <input type="number" id="jf-k8-terminal-qty" name="jf-k8-terminal-qty" value="0" min="0" class="qty-input" placeholder="數量">
                                </div>
                            </div>
                            <div class="sub-option-row">
                                <label>警鈴中繼器</label>
                                <input type="text" id="jf-bell-model" name="jf-bell-model" value="CHW-BY" class="model-input">
                                <input type="number" id="jf-bell-qty" name="jf-bell-qty" value="0" min="0" class="qty-input" placeholder="數量">
                            </div>
                            <div class="sub-option-row">
                                <label>防排煙中繼器</label>
                                <input type="text" id="jf-smoke-control-model" name="jf-smoke-control-model" value="CHW-R4" class="model-input">
                                <input type="number" id="jf-smoke-control-qty" name="jf-smoke-control-qty" value="0" min="0" class="qty-input" placeholder="數量">
                            </div>
                            <div class="sub-option-row">
                                <label>監視用中繼器</label>
                                <input type="text" id="jf-monitor-model" name="jf-monitor-model" value="CHW-S4A" class="model-input">
                                <input type="number" id="jf-monitor-qty" name="jf-monitor-qty" value="0" min="0" class="qty-input" placeholder="數量">
                            </div>
                            <div class="sub-option-row">
                                <label>瓦斯用中繼器</label>
                                <input type="text" id="jf-gas-model" name="jf-gas-model" value="CHW-G4" class="model-input">
                                <input type="number" id="jf-gas-qty" name="jf-gas-qty" value="0" min="0" class="qty-input" placeholder="數量">
                            </div>
                            <div class="sub-option-row">
                                <label>信號短路隔離</label>
                                <input type="text" id="jf-signal-isolator-model" name="jf-signal-isolator-model" value="CHW-SCI" class="model-input">

    <script>
        // 導覽列切換功能
        document.addEventListener('DOMContentLoaded', function() {
            const navButtons = document.querySelectorAll('.nav-button');
            const equipmentLists = document.querySelectorAll('.equipment-list');
            
            // 設置點擊事件
            navButtons.forEach(button => {
                button.addEventListener('click', function() {
                    const targetId = this.getAttribute('data-target');
                    
                    // 更新導覽按鈕狀態
                    navButtons.forEach(btn => btn.classList.remove('active'));
                    this.classList.add('active');
                    
                    // 顯示對應的內容
                    equipmentLists.forEach(list => {
                        list.classList.remove('active');
                    });
                    
                    const targetElement = document.getElementById(targetId);
                    if (targetElement) {
                        targetElement.classList.add('active');
                    }
                });
            });
        });

        // 添加其他設備
        function addOtherEquipment() {
            const modelInput = document.getElementById('other-model-input');
            const qtyInput = document.getElementById('other-qty-input');
            const equipmentList = document.getElementById('other-equipment-list');
            
            const model = modelInput.value.trim();
            const qty = parseInt(qtyInput.value);
            
            if (!model) {
                alert('請輸入設備型號！');
                return;
            }
            
            if (qty < 1) {
                alert('數量必須大於0！');
                return;
            }
            
            // 創建新的設備項目
            const itemId = 'other-' + Date.now();
            const newItem = document.createElement('div');
            newItem.className = 'other-item';
            newItem.id = itemId;
            newItem.innerHTML = `
                <input type="text" class="other-model" value="${model}" style="width: 250px;" readonly>
                <input type="number" class="other-qty" value="${qty}" min="1" style="width: 80px;">
                <button type="button" class="remove-btn" onclick="removeOtherEquipment('${itemId}')">刪除</button>
            `;
            
            equipmentList.appendChild(newItem);
            
            // 清空輸入欄位
            modelInput.value = '';
            qtyInput.value = 1;
        }
        
        // 刪除其他設備
        function removeOtherEquipment(itemId) {
            const item = document.getElementById(itemId);
            if (item) {
                item.remove();
            }
        }
        
        // 收集其他設備數據
        function collectOtherEquipmentData() {
            const equipmentList = document.getElementById('other-equipment-list');
            const items = equipmentList.querySelectorAll('.other-item');
            const equipmentData = [];
            
            items.forEach(item => {
                const model = item.querySelector('.other-model').value;
                const qty = parseInt(item.querySelector('.other-qty').value);
                
                if (model && qty > 0) {
                    equipmentData.push({
                        category: '其他設備',
                        model: model,
                        quantity: qty,
                        type: 'other'
                    });
                }
            });
            
            return equipmentData;
        }
        
        // 檢查其他設備是否有數據
        function hasOtherEquipmentSelected() {
            const equipmentData = collectOtherEquipmentData();
            return equipmentData.length > 0;
        }

        // 保持原有的所有JavaScript功能不變
        // 顯示設備選項（保留原有功能，但現在通過導覽列控制）
        function showEquipmentOptions() {
            // 這個函數現在不需要了，因為我們使用導覽列切換
        }

        // 切換船舶用設備底座顯示
        function toggleGFShipBase(type) {
            const qty = document.getElementById(`gf-${type}-qty`).value;
            const baseDiv = document.getElementById(`gf-${type}-base`);
            
            if (qty > 0) {
                baseDiv.style.display = 'block';
                document.getElementById(`gf-${type}-base-qty`).value = qty;
            } else {
                baseDiv.style.display = 'none';
                document.getElementById(`gf-${type}-base-qty`).value = 0;
            }
        }

        // 添加火警總機
        function addControlPanel(type) {
            const container = document.getElementById('control-panel-container');
            
            // 找到對應類型的最後一個元素
            let insertAfter = null;
            const rows = container.querySelectorAll('.sub-option-row');
            for (let i = rows.length - 1; i >= 0; i--) {
                const label = rows[i].querySelector('label');
                if (label && label.textContent === type) {
                    insertAfter = rows[i];
                    break;
                }
            }
            
            const newRow = document.createElement('div');
            newRow.className = 'sub-option-row';
            
            let modelOptions = '';
            if (type === 'HRN') {
                modelOptions = `
                    <option value="">-- 選擇型號 --</option>
                    <option value="HRN-ABW510FGA(T)">HRN-ABW510FGA(T)</option>
                    <option value="HRN-ABW1020FGA(T)">HRN-ABW1020FGA(T)</option>
                    <option value="HRN-ABS510FGA(T)">HRN-ABS510FGA(T)</option>
                    <option value="HRN-ABS1020FGA(T)">HRN-ABS1020FGA(T)</option>
                    <option value="HRN-ABS2040FGA(T)">HRN-ABS2040FGA(T)</option>
                    <option value="HRN-ABS2550FGA(T)">HRN-ABS2550FGA(T)</option>
                    <option value="HRN-ABS510FGA(T-OP5K)">HRN-ABS510FGA(T-OP5K)</option>				
                    <option value="HRN-ABS1020FGA(T-OP5K)">HRN-ABS1020FGA(T-OP5K)</option>
                    <option value="HRN-ABS2040FGA(T-OP5K)">HRN-ABS2040FGA(T-OP5K)</option>
                    <option value="HRN-ABS2550FGA(T-OP5K)">HRN-ABS2550FGA(T-OP5K)</option>
                `;
            } else if (type === 'HRR') {
                modelOptions = `
                    <option value="">-- 選擇型號 --</option>
                    <option value="HRR-AAW510">HRR-AAW510</option>
                    <option value="HRR-AAW1020">HRR-AAW1020</option>
                    <option value="HRR-AAS510">HRR-AAS510</option>
                    <option value="HRR-AAS1020">HRR-AAS1020</option>
                    <option value="HRR-AAS2040">HRR-AAS2040</option>
                    <option value="HRR-AAS2550">HRR-AAS2550</option>
                    <option value="HRR-AAS4080">HRR-AAS4080</option>
                    <option value="HRR-AAS5100">HRR-AAS5100</option>
                    <option value="HRR-AAS5610">HRR-AAS5610</option>
                `;
            } else if (type === 'HRU') {
                modelOptions = `
                    <option value="">-- 選擇型號 --</option>
                    <option value="HRU-ABS510(OP)">HRU-ABS510(OP)</option>
                    <option value="HRU-ABS1020(OP)">HRU-ABS1020(OP)</option>
                `;
            }
            
            newRow.innerHTML = `
                <label>${type}</label>
                <select class="model-select">
                    ${modelOptions}
                </select>
                <input type="number" value="1" min="1" class="qty-input">
                <button type="button" class="add-btn" onclick="addControlPanel('${type}')">增添</button>
            `;
            
            if (insertAfter) {
                insertAfter.parentNode.insertBefore(newRow, insertAfter.nextSibling);
            } else {
                container.appendChild(newRow);
            }
        }

        // 檢查HRU數量並顯示/隱藏分散盤
        function checkHRUQuantity() {
            const hruQty = document.getElementById('jf-hru-qty').value;
            const distributionPanelRow = document.getElementById('distribution-panel-row');
            
            if (hruQty > 0) {

        // 添加分散盤
        function addDistributionPanel() {
            const container = document.getElementById('control-panel-container');
            
            // 找到分散盤的最後一個元素
            let insertAfter = null;
            const rows = container.querySelectorAll('.sub-option-row');
            for (let i = rows.length - 1; i >= 0; i--) {
                const label = rows[i].querySelector('label');
                if (label && label.textContent === '分散盤') {
                    insertAfter = rows[i];
                    break;
                }
            }
            
            const newRow = document.createElement('div');
            newRow.className = 'sub-option-row';
            
            newRow.innerHTML = `
                <label>分散盤</label>
                <select class="model-select">
                    <option value="">-- 選擇型號 --</option>
                    <option value="CMA-ABW510(OP)">CMA-ABW510(OP)</option>
                    <option value="CMA-ABW1020(OP)">CMA-ABW1020(OP)</option>
                    <option value="CMA-ABW2040(OP)">CMA-ABW2040(OP)</option>
                </select>
                <input type="number" value="1" min="1" class="qty-input">
                <button type="button" class="add-btn" onclick="addDistributionPanel()">增添</button>
            `;
            
            if (insertAfter) {
                insertAfter.parentNode.insertBefore(newRow, insertAfter.nextSibling);
            } else {
                // 如果沒有現有的分散盤，則插入到 HRU 之後
                const hruRows = container.querySelectorAll('.sub-option-row');
                let lastHRU = null;
                
                for (let i = hruRows.length - 1; i >= 0; i--) {
                    const label = hruRows[i].querySelector('label');
                    if (label && label.textContent === 'HRU') {
                        lastHRU = hruRows[i];
                        break;
                    }
                }
                
                if (lastHRU) {
                    lastHRU.parentNode.insertBefore(newRow, lastHRU.nextSibling);
                } else {
                    container.appendChild(newRow);
                }
            }
        }

        }

        // 匯出JSON檔案 - 修改為符合附件格式
        function exportToJSON() {
            const projectName = document.getElementById('project-name').value;
            
            if (!projectName) {
                alert('請填寫專案名稱！');
                return;
            }
            
            // 創建符合附件格式的JSON結構
            const jsonData = {
                projectInfo: {
                    name: projectName,
                    date: new Date().toISOString(),
                    exportDate: new Date().toLocaleString(),
                    version: "Ver.2.2"
                },
                systems: {}
            };
            
            // 收集所有系統的設備數據
            const systemConfigs = [
                { id: 'japanese-fire', name: '日規火警系統' },
                { id: 'american-fire', name: '美規火警系統' },
                { id: 'small-water', name: '小規模水鎗系統' },
                { id: 'medium-water', name: '中規模水鎗系統' },
                { id: 'large-water', name: '大規模水鎗系統' },
                { id: 'american-gas', name: '美規氣體滅火' },
                { id: 'fixed-extinguisher', name: '固定式滅火設備' },
                { id: 'general-fire', name: '一般消防設備' },
                { id: 'other', name: '其他設備' }
            ];
            
            // 收集每個系統的設備
            systemConfigs.forEach(system => {
                const equipmentData = collectSystemEquipmentData(system.id);
                if (equipmentData.length > 0) {
                    jsonData.systems[system.id] = {
                        name: system.name,
                        equipment: equipmentData
                    };
                }
            });
            
            // 檢查是否有任何系統數據
            if (Object.keys(jsonData.systems).length === 0) {
                alert('沒有選擇任何設備！');
                return;
            }
            
            // 轉換為JSON格式
            const jsonContent = JSON.stringify(jsonData, null, 2);
            
            // 創建並下載JSON文件
            const blob = new Blob([jsonContent], { type: 'application/json' });
            const a = document.createElement('a');
            const date = new Date().toISOString().slice(0, 10).replace(/-/g, '');
            a.href = URL.createObjectURL(blob);
            a.download = `${projectName}_消防設備清單_${date}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            
            alert('JSON檔案已匯出成功！');
        }
        
// 收集系統設備數據
function collectSystemEquipmentData(systemType) {
    const equipmentList = [];
    
    // 通用收集函數
    const collectBasicItem = (modelId, qtyId, category) => {
        const model = document.getElementById(modelId)?.value;
        const qty = parseInt(document.getElementById(qtyId)?.value) || 0;
        if (model && qty > 0) {
            return {
                category: category,
                model: model,
                quantity: qty,
                type: 'primary'
            };
        }
        return null;
    };

    // 收集選擇型項目
    const collectSelectItem = (modelId, qtyId, category) => {
        const modelSelect = document.getElementById(modelId);
        const qty = parseInt(document.getElementById(qtyId)?.value) || 0;
        if (modelSelect && modelSelect.value && qty > 0) {
            return {
                category: category,
                model: modelSelect.value,
                quantity: qty,
                type: 'primary'
            };
        }
        return null;
    };

    // 收集動態項目
    const collectDynamicItems = (containerId, category) => {
        const items = [];
        const container = document.getElementById(containerId);
        if (!container) return items;
        
        const rows = container.querySelectorAll('.sub-option-row');
        rows.forEach(row => {
            const modelSelect = row.querySelector('.model-select');
            const qtyInput = row.querySelector('.qty-input');
            
            if (modelSelect && qtyInput && modelSelect.value && qtyInput.value > 0) {
                items.push({
                    category: category,
                    model: modelSelect.value,
                    quantity: parseInt(qtyInput.value),
                    type: 'primary'
                });
            }
        });
        return items;
    };

    // 收集組項目
    const collectGroupItems = (prefix, itemMap) => {
        const items = [];
        Object.entries(itemMap).forEach(([idPart, displayName]) => {
            const model = document.getElementById(`${prefix}-${idPart}-model`)?.value;
            const qty = parseInt(document.getElementById(`${prefix}-${idPart}-qty`)?.value) || 0;
            
            if (model && qty > 0) {
                items.push({
                    category: displayName,
                    model: model,
                    quantity: qty,
                    type: 'primary'
                });
            }
        });
        return items;
    };         
    // 根據系統類型收集數據
    switch(systemType) {
        case 'japanese-fire':
            // 火警總機
            const panelItems = collectDynamicItems('control-panel-container', '火警總機');
            equipmentList.push(...panelItems);
            
            // 定址設備
            const addressableItems = collectGroupItems('jf', {
                'smoke': '定址偵煙',
                'differential': '定址差動',
                'fixed-temp': '定址定溫',
                'transmitter': '定址發信機',
                'photo': '定址光電分離型'
            });
            equipmentList.push(...addressableItems);
            
            // 連接線
            const connectionWire = collectBasicItem('jf-connection-wire-model', 'jf-connection-wire-qty', '連接線');
            if (connectionWire) equipmentList.push(connectionWire);
            
            // 中繼器
            const relayItems = collectGroupItems('jf', {
                'kl': '火警單回KL',
                'k4': '火警4回K4',
                'k8': '火警8回K8',
                'bell': '警鈴中繼器',
                'smoke-control': '防排煙中繼器',
                'monitor': '監視用中繼器',
                'gas': '瓦斯用中繼器',
                'signal-isolator': '信號短路隔離',
                'power-isolator': '電源短路隔離'
            });
            equipmentList.push(...relayItems);
            
            // 終端電阻
            const terminalItems = collectGroupItems('jf', {
                'kl-terminal': 'KL終端電阻',
                'k4-terminal': 'K4終端電阻',
                'k8-terminal': 'K8終端電阻'
            });
            equipmentList.push(...terminalItems);
            
            // 選配設備
            const optionalItems = collectGroupItems('jf', {
                'battery': '預備電池',
                'serial-board': '串列機板',
                'rp-board': 'R/P移報版',
                'fiber-card': '光纖網路卡',
                'copper-card': '銅線網路卡',
                'handheld-configurator': '手持設定器',
                'subunit': '副機'
            });
            equipmentList.push(...optionalItems);
            break;
            
        case 'american-fire':
            // 動態添加的火警總機
            const afPanels = collectDynamicItems('af-control-panel-container', '火警總機');
            equipmentList.push(...afPanels);
            
            // 定址設備
            const afAddressableItems = collectGroupItems('af', {
                'smoke': '偵煙探測器',
                'compensator': '補償式探測器',
                'combo': '煙熱復合式探測器',
                'co': 'CO復合探測器'
            });
            equipmentList.push(...afAddressableItems);
            
            // 中繼器
            const afRelayItems = collectGroupItems('af', {
                'fire-module': '火警模組',
                'monitor-module': '監視模組',
                'control-module': '控制模組',
                'isolator-module': '隔離模組'
            });
            equipmentList.push(...afRelayItems);

                let items = '';

                    const model = document.getElementById(`${prefix}-${idPart}-model`)?.value;
                    const qty = document.getElementById(`${prefix}-${idPart}-qty`)?.value;
                    
                    if (model && qty > 0) {
                        items += `
                            <tr>
                                <td>${itemCounter}</td>
                                <td>${displayName}</td>
                                <td>${model}</td>
                                <td>${qty}</td>
                            </tr>

                        itemCounter++; // 增加序號
                        
                        // 處理底座
                        const baseModel = document.getElementById(`${prefix}-${idPart}-base-model`)?.value;
                        const baseQty = document.getElementById(`${prefix}-${idPart}-base-qty`)?.value;
                        if (baseModel && baseQty > 0) {
                            items += `
                                <tr>
                                    <td>${itemCounter}</td>
                                    <td>${displayName}底座</td>
                                    <td>${baseModel}</td>
                                    <td>${baseQty}</td>

                            itemCounter++; // 增加序號

                return items;

                const rows = container.querySelectorAll('.sub-option-row');
                rows.forEach(row => {
                    const modelSelect = row.querySelector('.model-select');
                    const qtyInput = row.querySelector('.qty-input');
                    
                    if (modelSelect && qtyInput && modelSelect.value && qtyInput.value > 0) {
                        items += `
                            <tr>
                                <td>${itemCounter}</td>
                                <td>${itemName}</td>
                                <td>${modelSelect.value}</td>
                                <td>${qtyInput.value}</td>
                            </tr>

                        itemCounter++; // 增加序號
